<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GoShare</title>
    <script>
      // GitHub Pages SPA routing fix
      // When visiting /owen or any route directly, GitHub Pages returns 404
      // This script redirects to index.html with the path preserved
      const basePath = window.location.pathname.split('/').slice(0, -1).join('/') || '/';
      const pathWithoutBase = window.location.pathname.substring(basePath.length);
      const cleanPath = pathWithoutBase.split('?')[0] || '/';
      
      if (cleanPath !== '/' && cleanPath !== '') {
        // Redirect to home with the path preserved as a hash
        window.location.replace(basePath + '?pathname=' + encodeURIComponent(cleanPath));
      } else {
        window.location.replace(basePath);
      }
    </script>
  </head>
  <body>
  </body>
</html>
