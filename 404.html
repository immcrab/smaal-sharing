<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>GoShare</title>
    <script>
      // GitHub Pages SPA routing fix
      // When visiting /owen or any route directly, GitHub Pages returns 404
      // This script redirects to index.html with the path preserved as a query param
      const path = window.location.pathname
        .replace(new RegExp('^' + process.env.PUBLIC_URL || ''), '') // Remove base URL
        .replace(/^\//, '') // Remove leading slash
        .split('?')[0]; // Remove query params
      
      if (path) {
        window.location.replace('/?redirect=' + encodeURIComponent('/' + path));
      } else {
        window.location.replace('/');
      }
    </script>
  </head>
  <body>
  </body>
</html>
